services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    command: npx nodemon --legacy-watch --ext js,json server.js
    working_dir: /app/gateway
    environment:
      PEERS: http://replica1:5001,http://replica2:5002,http://replica3:5003
      GATEWAY_WS_PORT: 8080
      GATEWAY_HEALTH_PORT: 8081
      LOG_DIR: /app/logs
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./gateway:/app/gateway
      - ./logs/gateway:/app/logs
    depends_on:
      replica1:
        condition: service_healthy
      replica2:
        condition: service_healthy
      replica3:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  replica1:
    build:
      context: .
      dockerfile: replica/Dockerfile
    container_name: replica1
    command: npx nodemon --legacy-watch --ext js,json server.js
    working_dir: /app/replica
    environment:
      ID: node1
      PORT: 5001
      PEERS: http://replica1:5001,http://replica2:5002,http://replica3:5003
      LOG_DIR: /app/logs
    ports:
      - "5001:5001"
    volumes:
      - ./replica:/app/replica
      - ./logs/replica1:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  replica2:
    build:
      context: .
      dockerfile: replica/Dockerfile
    container_name: replica2
    command: npx nodemon --legacy-watch --ext js,json server.js
    working_dir: /app/replica
    environment:
      ID: node2
      PORT: 5002
      PEERS: http://replica1:5001,http://replica2:5002,http://replica3:5003
      LOG_DIR: /app/logs
    ports:
      - "5002:5002"
    volumes:
      - ./replica:/app/replica
      - ./logs/replica2:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  replica3:
    build:
      context: .
      dockerfile: replica/Dockerfile
    container_name: replica3
    command: npx nodemon --legacy-watch --ext js,json server.js
    working_dir: /app/replica
    environment:
      ID: node3
      PORT: 5003
      PEERS: http://replica1:5001,http://replica2:5002,http://replica3:5003
      LOG_DIR: /app/logs
    ports:
      - "5003:5003"
    volumes:
      - ./replica:/app/replica
      - ./logs/replica3:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5003/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
